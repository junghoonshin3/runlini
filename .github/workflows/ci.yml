name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run guardrails
        run: dart run tool/guardrails.dart

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
